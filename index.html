let _submitting=false;
function withGuard(btn, fn){ if(_submitting) return; _submitting=true; if(btn){ btn._html=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Procesando…'; } setTimeout(()=>{ try{ fn(); } finally { _submitting=false; if(btn){ btn.disabled=false; btn.innerHTML=btn._html; } } },500); }
function saveDraft(){ withGuard($('#btnSaveDraft'), ()=>{ persistDraft(); toast(t('toast_saved')); closeModal(); if(['calendar','publishing'].includes(state.view)) renderView(); }); }
function persistDraft(){ const d=state.draft; if(postById(d.id)){ PostService.update(d.id, d); } else { DB.posts.push(normalizePost(d)); StorageService.save(); } }
function scheduleDraft(){
  const list=ValidationService.validatePost(state.draft, draftAccounts());
  if(ValidationService.isBlocked(list)){ toast(t('toast_fixErrors'),'warn'); updateValidationPanel(); return; }
  if(!state.draft.scheduledAt){ toast(t('toast_pickDate'),'warn'); return; }
  withGuard($('#btnSchedule'), ()=>{
    persistDraft(); const p=postById(state.draft.id); SchedulerService.schedule(p);
    closeModal(); toast(t('toast_scheduledFor',{when:DateService.formatDateTime(p.scheduledAt,p.timezone)}),'red');
    if(state.view==='calendar'||state.view==='publishing'||state.view==='overview') renderView(); else go('calendar');
  });
}
function cancelDraftSchedule(){ const p=postById(state.draft.id); if(p){ PostService.cancelSchedule(p.id); toast(t('toast_scheduleCancelled')); } closeModal(); if(['calendar','publishing'].includes(state.view)) renderView(); }
function deleteDraft(id){ confirmDialog(t('del_title'),t('del_msg'),()=>{ PostService.remove(id); closeModal(); toast(t('del_done')); if(['calendar','publishing','analytics'].includes(state.view)) renderView(); }, true); }
function duplicatePost(id){ const c=PostService.duplicate(id); if(c){ toast(t('dup_done')); openPostForm(c.id); } }

/* ============================ VIEW: CALENDAR ============================ */
function calPostsFor(y,m,d){ const key=`${y}-${DateService.pad(m+1)}-${DateService.pad(d)}`; return wsPosts().filter(p=>{ const iso=p.scheduledAt||p.publishedAt; if(!iso) return false; return DateService.dateKey(iso,p.timezone)===key; }); }
function viewCalendar(){
  const C=state.calendar; const modeBtns=[['month',t('cal_month')],['week',t('cal_week')],['day',t('cal_day')],['list',t('cal_list')]];
  const label = C.mode==='list' ? t('cal_all') : DateService.monthLabel(C.cursorY, C.cursorM);
  let body='';
  if(C.mode==='month') body=calMonth();
  else if(C.mode==='week') body=calWeek();
  else if(C.mode==='day') body=calDay();
  else body=calList();
  return head('calendar',`<div class="pill-tabs">${modeBtns.map(b=>`<button type="button" class="${C.mode===b[0]?'active':''}" onclick="calMode('${b[0]}')">${b[1]}</button>`).join('')}</div><button type="button" class="btn btn-sm btn-primary" onclick="openPostForm(null,{})">${ICON.plus}${t('add')}</button>`)+`
  <div class="flex ac jb wrap g8 mb16">
    <div class="month-nav">${C.mode!=='list'?`<button type="button" class="btn btn-icon btn-sm" onclick="calNav(-1)" aria-label="${escapeAttr(t('prev'))}">${ICON.chevL}</button><b>${label}</b><button type="button" class="btn btn-icon btn-sm" onclick="calNav(1)" aria-label="${escapeAttr(t('next'))}">${ICON.chev}</button><button type="button" class="btn btn-sm btn-ghost" onclick="calToday()">${t('today')}</button>`:`<b>${label}</b>`}</div>
    <div class="flex ac g8 wrap">${Object.entries(STATUS).filter(([k])=>['scheduled','queued','published','failed','manual_action_required'].includes(k)).map(([k,v])=>`<span class="chip"><span class="dot" style="background:${v.c};box-shadow:none"></span>${escapeHTML(statusLabel(k))}</span>`).join('')}</div>
  </div>
  ${body}
  <p class="mut3 mt16" style="font-size:11.5px">${t('cal_hint')} ${simBanner(t('simPublish'))}</p>`;
}
function calMonth(){
  const C=state.calendar; const weeks=DateService.monthMatrix(C.cursorY,C.cursorM);
  return `<div class="card card-pad"><div class="cal-grid mb8">${DateService.DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
  <div class="cal-grid">${weeks.flat().map(cell=>{ const posts=calPostsFor(cell.y,cell.m,cell.d); const today=DateService.isToday(cell.y,cell.m,cell.d); return `
    <div class="cal-cell ${today?'today':''}" style="${cell.inMonth?'':'opacity:.4'}" ondragover="event.preventDefault();this.style.borderColor='var(--red)'" ondragleave="this.style.borderColor=''" ondrop="calDrop(event,${cell.y},${cell.m},${cell.d})" onclick="calCellAdd(${cell.y},${cell.m},${cell.d})">
      <div class="d">${cell.d}${today?' · '+t('today'):''}</div>
      ${posts.slice(0,3).map(p=>calChip(p)).join('')}
      ${posts.length>3?`<div class="cal-more" onclick="event.stopPropagation();calDayModal(${cell.y},${cell.m},${cell.d})">${t('cal_moreN',{n:posts.length-3})}</div>`:''}
    </div>`; }).join('')}</div></div>`;
}
function calChip(p){ const st=STATUS[p.status]||{c:'#888'}; const pub=['published','failed','cancelled','manual_action_required'].includes(p.status); return `<div class="cal-post ${pub?'pub':''}" draggable="${!pub}" ondragstart="calDrag(event,'${p.id}')" onclick="event.stopPropagation();openPostForm('${p.id}')" style="border-left-color:${st.c}" title="${escapeAttr(p.title)} · ${escapeAttr(statusLabel(p.status))}"><span class="st-dot" style="background:${st.c}"></span>${platGlyph(p.platforms[0])} ${escapeHTML(p.title)}</div>`; }
let _drag=null;
function calDrag(e,id){ _drag=id; e.dataTransfer.effectAllowed='move'; }
function calDrop(e,y,m,d){ e.preventDefault(); const cell=e.currentTarget; if(cell) cell.style.borderColor=''; if(!_drag) return; const p=postById(_drag); _drag=null; if(!p) return;
  if(p.status==='published'){ confirmDialog(t('cal_pubMoveTitle'),t('cal_pubMoveMsg'),()=>{ const c=PostService.duplicate(p.id); const parts=DateService.partsInTz(p.publishedAt||DateService.nowISO(),p.timezone); c.scheduledAt=DateService.fromInputs(`${y}-${DateService.pad(m+1)}-${DateService.pad(d)}`,`${DateService.pad(parts.h)}:${DateService.pad(parts.mi)}`,c.timezone); c.status='scheduled'; StorageService.save(); renderView(); toast(t('dup_done')); }); return; }
  const src=p.scheduledAt||DateService.nowISO(); const parts=DateService.partsInTz(src,p.timezone);
  p.scheduledAt=DateService.fromInputs(`${y}-${DateService.pad(m+1)}-${DateService.pad(d)}`,`${DateService.pad(parts.h)}:${DateService.pad(parts.mi)}`,p.timezone);
  if(p.status==='idea'||p.status==='cancelled') p.status='scheduled';
  p.updatedAt=DateService.nowISO(); StorageService.save(); renderView(); toast(t('cal_reprogrammed',{date:DateService.formatDate(p.scheduledAt,p.timezone)}));
}
function calCellAdd(y,m,d){ openPostForm(null,{ scheduledAt:DateService.fromInputs(`${y}-${DateService.pad(m+1)}-${DateService.pad(d)}`,'09:00',CONFIG.DEFAULT_TZ), status:'idea' }); }
function calDayModal(y,m,d){ const posts=calPostsFor(y,m,d); openModal(`<span class="tag">${DateService.formatDate(DateService.fromInputs(`${y}-${DateService.pad(m+1)}-${DateService.pad(d)}`,'12:00',CONFIG.DEFAULT_TZ))}</span><h2 style="margin:8px 0 12px;font-size:19px">${t('cal_nPosts',{n:posts.length})}</h2>${posts.map(p=>calListRow(p)).join('')}<button type="button" class="btn btn-sm btn-primary mt8" onclick="closeModal();calCellAdd(${y},${m},${d})">${ICON.plus}${t('cal_addHere')}</button>`); }
function calMode(m){ state.calendar.mode=m; StorageService.save(); renderView(); }
function calNav(dir){ const C=state.calendar; if(C.mode==='day'){ const base=new Date(C.cursorY,C.cursorM,C.selDay||1); base.setDate(base.getDate()+dir); C.cursorY=base.getFullYear(); C.cursorM=base.getMonth(); C.selDay=base.getDate(); } else if(C.mode==='week'){ const base=new Date(C.cursorY,C.cursorM,(C.selDay||1)+dir*7); C.cursorY=base.getFullYear(); C.cursorM=base.getMonth(); C.selDay=base.getDate(); } else { let m=C.cursorM+dir,y=C.cursorY; if(m<0){m=11;y--;} if(m>11){m=0;y++;} C.cursorM=m; C.cursorY=y; } renderView(); }
function calToday(){ const t=new Date(); state.calendar.cursorY=t.getFullYear(); state.calendar.cursorM=t.getMonth(); state.calendar.selDay=t.getDate(); renderView(); }
function calWeek(){ const C=state.calendar; const days=DateService.weekOf(C.cursorY,C.cursorM,C.selDay||new Date().getDate()); return `<div class="card card-pad"><div class="cal-grid mb8">${days.map(d=>`<div class="cal-dow">${DateService.DOWS[days.indexOf(d)]} ${d.d}</div>`).join('')}</div><div class="cal-grid">${days.map(cell=>{ const posts=calPostsFor(cell.y,cell.m,cell.d); const today=DateService.isToday(cell.y,cell.m,cell.d); return `<div class="cal-cell ${today?'today':''}" style="min-height:220px" ondragover="event.preventDefault()" ondrop="calDrop(event,${cell.y},${cell.m},${cell.d})" onclick="calCellAdd(${cell.y},${cell.m},${cell.d})"><div class="d">${cell.d}</div>${posts.map(p=>calChip(p)).join('')}</div>`; }).join('')}</div></div>`; }
function calDay(){ const C=state.calendar; const d=C.selDay||new Date().getDate(); const posts=calPostsFor(C.cursorY,C.cursorM,d); return `<div class="card card-pad"><div class="section-title mb16">${DateService.DOWS[(new Date(C.cursorY,C.cursorM,d).getDay()+6)%7]} · ${d} ${DateService.MONTHS[C.cursorM]}<button type="button" class="btn btn-sm btn-primary" style="margin-left:auto" onclick="calCellAdd(${C.cursorY},${C.cursorM},${d})">${ICON.plus}${t('add')}</button></div>${posts.length?posts.map(p=>calListRow(p)).join(''):`<div class="empty">${t('cal_none')}</div>`}</div>`; }
function calList(){ const posts=wsPosts().filter(p=>p.scheduledAt||p.publishedAt).sort((a,b)=>new Date(b.scheduledAt||b.publishedAt)-new Date(a.scheduledAt||a.publishedAt)); return `<div class="card card-pad">${posts.length?posts.map(p=>calListRow(p)).join(''):`<div class="empty">${t('cal_emptyList')}</div>`}</div>`; }
function calListRow(p){ return `<div class="list-row"><div style="flex:1;min-width:0"><div class="flex ac g8">${platBadge(p.platforms[0],20)}<b style="font-size:13px">${escapeHTML(p.title)}</b>${statusBadge(p.status)}</div><span class="mut3" style="font-size:11.5px">${DateService.formatDateTime(p.scheduledAt||p.publishedAt,p.timezone)}${p.lastError?` · <span style="color:var(--bad)">${escapeHTML(p.lastError)}</span>`:''}</span></div><div class="flex g8"><button type="button" class="btn btn-sm btn-ghost" onclick="openPostForm('${p.id}')" aria-label="${escapeAttr(t('edit'))}">${ICON.eye}</button><button type="button" class="btn btn-sm btn-ghost" onclick="duplicatePost('${p.id}')" aria-label="${escapeAttr(t('duplicate'))}">${ICON.dup}</button></div></div>`; }

/* ============================ VIEW: PUBLISHING HUB ============================ */
function viewPublishing(){
  if(!state.draft || postById(state.draft.id)?.status==='published') newDraft({});
  window.__afterView=()=>{ renderDraftMedia(); updateCharCount(); updateValidationPanel(); };
  const queue=wsPosts().filter(p=>['scheduled','queued','publishing'].includes(p.status)).sort((a,b)=>new Date(a.scheduledAt)-new Date(b.scheduledAt));
  const done=wsPosts().filter(p=>['published','failed','manual_action_required'].includes(p.status)).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,8);
  return head('publishing',`${simBanner(t('simPublish'))} ${demoTag()}`)+`
  <div class="ai-block mb16" style="padding:16px"><div class="ai-badge"><span class="pulse"></span>${t('pub_recTitle')}</div><div class="flex g8 wrap mt8" style="position:relative">${[[t('pub_bestDate'),DateService.formatDate(DateService.daysAheadISO(1,19,30))],[t('pub_bestTime'),'19:30'],[t('pub_bestPlat'),'TikTok'],[t('pub_bestFmt'),'Reel <30s']].map(x=>`<span class="chip">${x[0]}: <b style="margin-left:4px">${x[1]}</b></span>`).join('')}<button type="button" class="btn btn-sm" style="margin-left:auto" onclick="applyRecommendation()">${t('pub_applyDraft')}</button></div></div>
  <div class="grid two" style="grid-template-columns:1.15fr 1fr;align-items:start">
    <div class="card card-pad"><div class="section-title mb8">${t('pub_compose')}</div>${postFormHTML('new')}
      <div class="flex jb mt16 g8 wrap"><button type="button" class="btn btn-sm btn-ghost" onclick="resetDraft()">${ICON.x}${t('emptyBtn')}</button><div class="flex g8"><button type="button" class="btn btn-sm" id="btnSaveDraft" onclick="saveDraftInline()">${ICON.save}${t('saveDraft')}</button><button type="button" class="btn btn-primary btn-sm" id="btnSchedule" onclick="scheduleInline()">${ICON.publish}${t('schedule')}</button></div></div>
    </div>
    <div>
      <div class="card card-pad mb16"><div class="section-title mb8">${t('pub_valByPlat')}<span class="tag">${t('pub_live')}</span></div><div id="valPanel">${validationPanelHTML()}</div></div>
      <div class="card card-pad"><div class="section-title mb8">${t('pub_queue')}<span class="tag">${t('pub_nInQueue',{n:queue.length})}</span></div>
        ${queue.length?queue.map(p=>queueRow(p)).join(''):`<div class="empty" style="padding:24px">${t('pub_queueEmpty')}</div>`}
        <button type="button" class="btn btn-sm btn-ghost" style="width:100%;justify-content:center;margin-top:8px" onclick="SchedulerService.processDuePosts();toast(t('pub_processing'))">${ICON.refresh}${t('pub_processOverdue')}</button>
      </div>
      ${done.length?`<div class="card card-pad mt16"><div class="section-title mb8">${t('pub_recent')}</div>${done.map(p=>queueRow(p)).join('')}</div>`:''}
    </div>
  </div>`;
}
function queueRow(p){ const st=STATUS[p.status]||{l:p.status,c:'#888'}; return `<div class="queue-row"><div class="platform-ico ${platIco(p.platforms[0])}" style="width:30px;height:30px;font-size:11px">${platGlyph(p.platforms[0])}</div><div style="flex:1;min-width:0"><b style="font-size:12.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHTML(p.title)}</b><span class="mut3" style="font-size:11px">${DateService.formatDateTime(p.scheduledAt||p.publishedAt,p.timezone)}${p.lastError?` · <span style="color:var(--bad)">${escapeHTML(p.lastError)}</span>`:''}</span></div>${statusBadge(p.status)}<div class="flex g4">${p.status==='manual_action_required'?`<button type="button" class="btn btn-sm btn-ghost" onclick="manualFlow('${p.id}')" aria-label="${escapeAttr(t('pub_manualTitle'))}">${ICON.link}</button>`:''}${['scheduled','queued'].includes(p.status)?`<button type="button" class="btn btn-sm btn-ghost" onclick="cancelFromQueue('${p.id}')" aria-label="${escapeAttr(t('cancel'))}">${ICON.x}</button>`:''}<button type="button" class="btn btn-sm btn-ghost" onclick="openPostForm('${p.id}')" aria-label="${escapeAttr(t('edit'))}">${ICON.eye}</button></div></div>`; }
function resetDraft(){ newDraft({}); renderView(); }
function saveDraftInline(){ withGuard($('#btnSaveDraft'), ()=>{ persistDraft(); toast(t('toast_draftSaved')); renderView(); }); }
function scheduleInline(){ const list=ValidationService.validatePost(state.draft, draftAccounts()); if(ValidationService.isBlocked(list)){ toast(t('toast_fixErrors'),'warn'); updateValidationPanel(); return; } if(!state.draft.scheduledAt){ toast(t('toast_pickDate'),'warn'); return; } withGuard($('#btnSchedule'), ()=>{ persistDraft(); const p=postById(state.draft.id); SchedulerService.schedule(p); toast(t('toast_scheduledFor',{when:DateService.formatDateTime(p.scheduledAt,p.timezone)}),'red'); newDraft({}); renderView(); }); }
function applyRecommendation(){ state.draft.scheduledAt=DateService.daysAheadISO(1,19,30); state.draft.timezone=CONFIG.DEFAULT_TZ; refreshFormPanels(); const dd=$('#pf-date'),tt=$('#pf-time'); if(dd)dd.value=DateService.inputDate(state.draft.scheduledAt,state.draft.timezone); if(tt)tt.value=DateService.inputTime(state.draft.scheduledAt,state.draft.timezone); toast(t('pub_applyDraft')); }
function cancelFromQueue(id){ PostService.cancelSchedule(id); toast(t('toast_scheduleCancelled')); renderView(); }
function manualFlow(id){ const p=postById(id); if(!p) return; openModal(`<span class="tag">${t('pub_manualTitle')}</span><h2 style="margin:8px 0 10px;font-size:19px">${escapeHTML(p.title)}</h2><p class="muted" style="font-size:13px;line-height:1.5">${escapeHTML(t('pub_manualMsg',{plat:platName(p.platforms[0])}))}</p>
  <div class="flex g8 wrap mt16"><button type="button" class="btn btn-sm" onclick="copyText(${JSON.stringify(p.caption).replace(/"/g,'&quot;')});">${ICON.copy}${t('pub_copyCaption')}</button><button type="button" class="btn btn-sm" onclick="copyText(${JSON.stringify((p.hashtags||[]).join(' ')).replace(/"/g,'&quot;')});">${ICON.copy}${t('pub_copyHashtags')}</button><button type="button" class="btn btn-sm" onclick="toast(t('toast_assetDl'))">${ICON.download}${t('pub_downloadAsset')}</button><button type="button" class="btn btn-sm" onclick="toast(t('toast_reminder'))">${ICON.clock}${t('pub_reminder')}</button></div>
  <ol class="muted" style="font-size:12.5px;line-height:1.7;margin:16px 0 0 18px"><li>${t('pub_manualStep1')}</li><li>${escapeHTML(t('pub_manualStep2',{plat:platName(p.platforms[0])}))}</li><li>${t('pub_manualStep3')}</li></ol>
  <button type="button" class="btn btn-primary btn-sm mt16" onclick="markManualDone('${p.id}')">${ICON.check}${t('pub_markPublished')}</button>`); }
function markManualDone(id){ const p=postById(id); if(p){ p.status='published'; p.publishedAt=DateService.nowISO(); p.metrics=synthMetrics(3000,4.5,25,isVideoFormat(p.format)); StorageService.save(); } closeModal(); toast(t('toast_markedPub')); renderView(); }
function copyText(t){ try{ navigator.clipboard.writeText(t); toast('Copiado'); }catch(e){ toast('Copia manual: '+t.slice(0,40)); } }

/* ============================ VIEW: WHAT SHOULD I POST? ============================ */
function recsFor(){
  const best=wsPosts().filter(p=>p.status==='published').sort((a,b)=>b.metrics.views-a.metrics.views)[0];
  const bestFmt=best?best.format:'Reel';
  const modes=['High viral potential','Authority building','Lead generation','Quick win','Community growth'];
  return DB.trends.slice(0,5).map((tr,i)=>({ id:'r'+i, mode:modes[i%modes.length], idea:tr.ideas[0], reason:t('rec_reason',{fmt:bestFmt,trend:tr.title,score:tr.score}), plat:tr.plats[0], format:bestFmt, objective:OBJECTIVES[i%OBJECTIVES.length], hook:tr.hook, cta:t('rec_cta'), time:'19:30', effort:t('rec_effort'), potential:tr.score, trend:tr.title }));
}
function viewPost(){
  const recs=recsFor();
  return head('post',`${demoTag()}<button type="button" class="btn btn-sm btn-primary" onclick="renderView();toast(t('rec_updated'))">${ICON.spark}${t('regenerate')}</button>`)+`
  <div class="ai-block mb16" style="padding:16px"><div class="ai-badge"><span class="pulse"></span>${t('rec_how')}</div><p class="muted" style="font-size:13px;margin-top:8px;position:relative;line-height:1.5">${escapeHTML(t('rec_howBody',{ws:ws().name}))}</p></div>
  <div class="grid stg" style="gap:14px">${recs.map(r=>`
    <div class="card card-pad"><div class="flex g16 wrap" style="align-items:flex-start">
      <div class="score-ring" style="--v:${r.potential}"><b>${r.potential}</b></div>
      <div style="flex:1;min-width:240px">
        <div class="flex ac g8 wrap mb8"><span class="chip red">${escapeHTML(r.mode)}</span><span class="chip">${platBadge(r.plat,16)}${platName(r.plat)}</span><span class="chip">${escapeHTML(r.format)}</span><span class="chip info">${ICON.target}${escapeHTML(r.objective)}</span></div>
        <h3 style="font-size:17px;margin-bottom:6px">${escapeHTML(r.idea)}</h3>
        <p class="muted" style="font-size:13px;line-height:1.5">${escapeHTML(r.reason)}</p>
        <div class="glass mt12" style="padding:10px 12px"><span class="tag">${t('rec_hook')}</span><div style="font-size:12.5px;margin-top:4px">"${escapeHTML(r.hook)}"</div></div>
        <div class="flex g8 mt16 wrap">
          <button type="button" class="btn btn-primary btn-sm" onclick='openPostForm(null,${JSON.stringify({title:r.idea,platforms:[r.plat],format:r.format,objective:r.objective,caption:r.hook}).replace(/'/g,"&#39;")})'>${ICON.calendar}${t('as_createPost')}</button>
          <button type="button" class="btn btn-sm" onclick="go('studio')">${ICON.studio}${t('rec_genScript')}</button>
          <button type="button" class="btn btn-sm btn-ghost" onclick="toast(t('rec_savedIdea'))">${ICON.save}${t('save')}</button>
        </div>
      </div>
    </div></div>`).join('')}</div>`;
}

    <div class="flex ac g8 wrap mt12"><span class="chip ${t.virality>80?'red':''}">${ICON.fire}Viral ${t.virality}</span><span class="chip">Sat. ${t.saturation}%</span><span class="chip good">Relev. ${t.relevance}</span></div>
  </div>`).join('')}</div>`;

function placeBlips(){ const r=$('#radar'); if(!r) return; r.querySelectorAll('.radar-blip').forEach(b=>b.remove()); const cx=r.clientWidth/2,cy=r.clientHeight/2; DB.trends.forEach((t,i)=>{ const ang=(i/DB.trends.length)*Math.PI*2 - Math.PI/2; const dist=40+(t.saturation/100)*(Math.min(cx,cy)-60); const size=22+(t.virality/100)*26; const x=cx+Math.cos(ang)*dist,y=cy+Math.sin(ang)*dist; const el=document.createElement('div'); el.className='radar-blip'; el.style.left=x+'px'; el.style.top=y+'px'; el.onclick=()=>trendDrawer(t.id); el.innerHTML=`<div class="b" style="width:${size}px;height:${size}px">${t.score}</div><div class="lbl">${escapeHTML(t.title)}</div>`; r.appendChild(el); }); }
function trendDrawer(id){ const t=DB.trends.find(x=>x.id===id); drawer(`
  <div class="flex ac jb mb16"><span class="tag">${escapeHTML(t.cat)}</span><button type="button" class="btn btn-sm btn-ghost" onclick="closeDrawer()">${ICON.x}</button></div>
  <div class="flex ac g16 mb16"><div class="score-ring" style="--v:${t.score}"><b>${t.score}</b></div><div><h2 style="font-size:20px">${escapeHTML(t.title)}</h2><div class="mut3" style="font-size:12px;margin-top:4px">${escapeHTML(t.source)} · ${escapeHTML(t.country)}</div></div></div>
  <p class="muted" style="font-size:13.5px;line-height:1.6;margin-bottom:16px">${escapeHTML(t.summary)}</p>
  <div class="grid two" style="gap:10px;margin-bottom:16px">${[['Velocidad',t.speed],['Vida útil',t.life],['Viralidad',t.virality+'/100'],['Saturación',t.saturation+'%'],['Relevancia',t.relevance+'/100'],['Riesgo',t.risk]].map(x=>`<div class="glass" style="padding:12px"><span class="tag">${x[0]}</span><div style="font-size:14px;margin-top:4px;font-weight:600">${escapeHTML(x[1])}</div></div>`).join('')}</div>
  <div class="glass" style="padding:14px;margin-bottom:12px"><span class="tag">Hook recomendado</span><p style="font-size:13.5px;margin-top:6px">"${escapeHTML(t.hook)}"</p></div>
  <div class="glass" style="padding:14px;margin-bottom:16px"><span class="tag">Ideas</span>${t.ideas.map(i=>`<div class="flex ac g8 mt8" style="font-size:13px"><span style="color:var(--red)">${ICON.spark}</span>${escapeHTML(i)}</div>`).join('')}</div>

      <p class="mut3" style="font-size:11.5px;margin-top:10px">${t('se_stripeNote')}</p>
    </div>
  </div>`;
}
function resetDemoConfirm(){ confirmDialog(t('se_resetTitle'),t('se_resetMsg'),()=>{ StorageService.reset(); state.screen='app'; state.view='overview'; render(); toast(t('se_resetDone'),'red'); }, true); }

/* ============================ INIT ============================ */
function boot(){
  try{ StorageService.load(); }catch(e){ console.warn('load failed, using seed', e); }
  StorageService.save();
  document.addEventListener('keydown', e=>{
    if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); if(state.screen==='app') cmdPalette(); }
    if(e.key==='Escape'){ closeModal(); closeDrawer(); }
  });
  window.addEventListener('beforeunload', ()=>{ revokeAllObjectURLs(); });
  window.addEventListener('resize', ()=>{ Object.values(chartInstances).forEach(c=>{ try{ c.resize(); }catch(e){} }); });
  SchedulerService.processDuePosts();
  setInterval(()=>{ if(state.screen==='app') SchedulerService.processDuePosts(); }, CONFIG.SCHEDULER_TICK_MS);
  render();
}
boot();


</script>
